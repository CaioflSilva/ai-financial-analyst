name: CI - AI Financial Analyst

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aifinancialanalyst
          POSTGRES_USER: aifinancial
          POSTGRES_PASSWORD: aifinancial123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create application-dev.yaml
        run: |
          cat > src/main/resources/application-dev.yaml << 'EOF'
          spring:
            datasource:
              url: jdbc:postgresql://localhost:5432/aifinancialanalyst
              username: aifinancial
              password: aifinancial123
              driver-class-name: org.postgresql.Driver
            jpa:
              hibernate:
                ddl-auto: validate
              show-sql: false
              open-in-view: false
              properties:
                hibernate:
                  format_sql: false
            flyway:
              enabled: true
              locations: classpath:db/migration
              baseline-on-migrate: true
            ai:
              openai:
                api-key: test-key
                base-url: https://api.groq.com/openai
                chat:
                  options:
                    model: llama-3.3-70b-versatile
          jwt:
            secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
            expiration: 86400000
          EOF

      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/